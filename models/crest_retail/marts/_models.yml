version: 2

models:
  - name: dim_customers
    description: "Customer dimension with computed tenure."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension with margin %."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_stores
    description: "Store dimension."
    columns:
      - name: store_id
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Date spine 2020-2026."
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: "Sales fact. One row per line item."
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: store_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
