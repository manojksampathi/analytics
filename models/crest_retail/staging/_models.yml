version: 2

models:
  - name: stg_orders
    description: "Cleaned DTC orders. One row per order."
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['Completed', 'Cancelled', 'Pending']

  - name: stg_order_items
    description: "Cleaned DTC order line items."
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null

  - name: stg_customers
    description: "Customer master data."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Product catalog."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_stores
    description: "Store master data."
    columns:
      - name: store_id
        tests:
          - unique
          - not_null
