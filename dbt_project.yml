name: 'analytics'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ─────────────────────────────────────────────────────────────────
# Model configurations
# ─────────────────────────────────────────────────────────────────
models:
  analytics:
    crest_retail:
      staging:
        +materialized: view
        +schema: crest_staging        # writes to: crest_staging
      marts:
        +materialized: table
        +schema: crest_sales_mart     # writes to: crest_sales_mart
